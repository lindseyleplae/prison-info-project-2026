name: Weekly Content Audit

# Checks that fail because time passed (pages overdue for re-review, external
# DOC links that went dead) rather than because of a bad push. They run on a
# schedule instead of blocking deploys: a failed run is the signal to re-verify
# the flagged pages, then update lastVerified/reviewBy or fix the link.
on:
  schedule:
    - cron: '0 14 * * 1' # Mondays 14:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Freshness and external links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check page freshness
        run: npm run check:freshness

      - name: Check external links
        run: npm run check:external-links
